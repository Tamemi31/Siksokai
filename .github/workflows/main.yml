name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project
      run: |
        ls -la
        unzip *.zip
        ls -la SiksokAI/

    - name: Fix build.gradle (namespace + SDK)
      run: |
        sed -i '/compileSdkVersion 33/a\    namespace "com.siksok.ai"' SiksokAI/app/build.gradle
        sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 16/g' SiksokAI/app/build.gradle
        sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 30/g' SiksokAI/app/build.gradle

    - name: Enable AndroidX support
      run: |
        echo "android.useAndroidX=true" >> SiksokAI/gradle.properties
        echo "android.enableJetifier=true" >> SiksokAI/gradle.properties

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build APK
      working-directory: SiksokAI
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SiksokAI-APK
        path: SiksokAI/app/build/outputs/apk/debug/app-debug.apk
